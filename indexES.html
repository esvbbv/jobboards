<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Now Hiring</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: #003A8F;
    overflow: hidden;
  }

  .header {
    padding: 30px 40px 10px 40px;
    font-size: 56px;
    font-weight: bold;
    background: white;
  }

  .subheader {
    padding: 0 40px 20px 40px;
    font-size: 24px;
    color: #555;
    background: white;
  }

  .content {
    position: absolute;
    top: 130px;
    left: 0;
    right: 280px;
    bottom: 0;
    overflow: hidden;
    padding: 0 40px 40px 40px;
    box-sizing: border-box;
  }

  #jobs {
    animation: scroll 45s linear infinite;
  }

  .job {
    margin: 0 0 28px 0;
    padding: 0 0 18px 0;
    border-bottom: 2px solid #eee;
  }

  .job-title {
    font-size: 34px;
    font-weight: bold;
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .location {
    font-size: 22px;
    color: #666;
    margin-bottom: 6px;
  }

  .description {
    font-size: 20px;
    color: #333;
  }

  .qr {
    position: absolute;
    right: 30px;
    bottom: 30px;
    width: 220px;
    text-align: center;
  }

  .qr img {
    width: 200px;
    height: 200px;
  }

  .qr p {
    font-size: 20px;
    margin-top: 10px;
    color: #333;
  }

  @keyframes scroll {
    0% { transform: translateY(0); }
    100% { transform: translateY(-50%); }
  }
</style>
</head>
<body>

<div class="header">Now Hiring</div>
<div class="subheader">Explore current openings and scan to apply</div>

<div class="content">
  <div id="jobs">Loading jobs...</div>
</div>

<div class="qr">
  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://hilton.referrals.selectminds.com/page/doubletree-crystal-city-job-openings-606#/" alt="QR Code">
  <p>Scan to Apply</p>
</div>

<script>
const API_URL = "https://opensheet.elk.sh/1JM8lZpot6u4NalDDxqqt-dweKB7rXgAkWEBRXDs37h0/Jobs";

async function loadJobs() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const container = document.getElementById("jobs");
    container.innerHTML = "";

    data.forEach(job => {
      const title = job["Job Title"] || "Job Opening";
      const date = job["Post Date"] || "";
      const req = job["Requisition Number"] || "";

      const div = document.createElement("div");
      div.className = "job";

      div.innerHTML = `
        <div class="job-title">${title}</div>
        <div class="location">Posted: ${date}</div>
        <div class="description">Req #: ${req}</div>
      `;

      container.appendChild(div);
    });

    if (!data.length) {
      container.innerHTML = "<div class='job-title'>No current openings found.</div>";
      return;
    }

    container.innerHTML += container.innerHTML;
  } catch (e) {
    document.getElementById("jobs").innerHTML = "Unable to load jobs.";
    console.error(e);
  }
}

loadJobs();
setInterval(loadJobs, 60000);
</script>

</body>
</html>
